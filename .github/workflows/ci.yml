name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          shopt -s globstar nullglob
          files=(installer.sh bootstrap.sh lib/*.sh recipes/*.sh)
          shellcheck -x -S warning "${files[@]}"

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats
      - name: Run test suite
        run: bats test/
