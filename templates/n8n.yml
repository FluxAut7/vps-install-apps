version: "3.8"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "__REDIS_PASSWORD__"]
    volumes:
      - __STACK_NAME___redis:/data
    networks:
      - __NETWORK_NAME__
    deploy:
      placement:
        constraints:
          - node.role == manager

  editor:
    image: n8nio/n8n:latest
    command: start
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: "__POSTGRES_HOST__"
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "__POSTGRES_DATABASE__"
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: "__POSTGRES_PASSWORD__"
      N8N_ENCRYPTION_KEY: "__N8N_ENCRYPTION_KEY__"
      N8N_HOST: "__EDITOR_DOMAIN__"
      N8N_EDITOR_BASE_URL: "https://__EDITOR_DOMAIN__/"
      WEBHOOK_URL: "https://__WEBHOOK_DOMAIN__/"
      N8N_PROTOCOL: https
      NODE_ENV: production
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: "__REDIS_PASSWORD__"
      N8N_RUNNERS_ENABLED: "true"
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_DEFAULT_LOCALE: pt-BR
    volumes:
      - __STACK_NAME___data:/home/node/.n8n
    networks:
      - __NETWORK_NAME__
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.__STACK_NAME___editor.rule=Host(`__EDITOR_DOMAIN__`)"
        - "traefik.http.routers.__STACK_NAME___editor.entrypoints=websecure"
        - "traefik.http.routers.__STACK_NAME___editor.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.__STACK_NAME___editor.loadbalancer.server.port=5678"
        - "traefik.docker.network=__NETWORK_NAME__"

  webhook:
    image: n8nio/n8n:latest
    command: webhook
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: "__POSTGRES_HOST__"
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "__POSTGRES_DATABASE__"
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: "__POSTGRES_PASSWORD__"
      N8N_ENCRYPTION_KEY: "__N8N_ENCRYPTION_KEY__"
      N8N_HOST: "__EDITOR_DOMAIN__"
      N8N_EDITOR_BASE_URL: "https://__EDITOR_DOMAIN__/"
      WEBHOOK_URL: "https://__WEBHOOK_DOMAIN__/"
      N8N_PROTOCOL: https
      NODE_ENV: production
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: "__REDIS_PASSWORD__"
      N8N_RUNNERS_ENABLED: "true"
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
      N8N_DEFAULT_LOCALE: pt-BR
    networks:
      - __NETWORK_NAME__
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.__STACK_NAME___webhook.rule=Host(`__WEBHOOK_DOMAIN__`)"
        - "traefik.http.routers.__STACK_NAME___webhook.entrypoints=websecure"
        - "traefik.http.routers.__STACK_NAME___webhook.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.__STACK_NAME___webhook.loadbalancer.server.port=5678"
        - "traefik.docker.network=__NETWORK_NAME__"

  worker:
    image: n8nio/n8n:latest
    command: worker --concurrency=10
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: "__POSTGRES_HOST__"
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: "__POSTGRES_DATABASE__"
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: "__POSTGRES_PASSWORD__"
      N8N_ENCRYPTION_KEY: "__N8N_ENCRYPTION_KEY__"
      N8N_HOST: "__EDITOR_DOMAIN__"
      WEBHOOK_URL: "https://__WEBHOOK_DOMAIN__/"
      N8N_PROTOCOL: https
      NODE_ENV: production
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_PASSWORD: "__REDIS_PASSWORD__"
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
    volumes:
      - __STACK_NAME___data:/home/node/.n8n
    networks:
      - __NETWORK_NAME__
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  __STACK_NAME___data:
    name: __STACK_NAME___data
  __STACK_NAME___redis:
    name: __STACK_NAME___redis

networks:
  __NETWORK_NAME__:
    external: true
