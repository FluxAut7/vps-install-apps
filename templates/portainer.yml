version: "3.8"

services:
  agent:
    image: __PORTAINER_AGENT_IMAGE__
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - __NETWORK_NAME__
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux

  portainer:
    image: __PORTAINER_IMAGE__
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: ingress
    volumes:
      - portainer_data:/data
    networks:
      - __NETWORK_NAME__
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.portainer.rule=Host(`__PORTAINER_DOMAIN__`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"
        - "traefik.docker.network=__NETWORK_NAME__"

volumes:
  portainer_data:
    name: portainer_data

networks:
  __NETWORK_NAME__:
    external: true
