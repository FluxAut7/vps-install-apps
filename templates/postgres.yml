version: "3.8"

services:
  __SERVICE_NAME__:
    image: __POSTGRES_IMAGE__
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "__POSTGRES_PASSWORD__"
      POSTGRES_DB: postgres
    volumes:
      - __STACK_NAME___data:/var/lib/postgresql/data
    networks:
      - __NETWORK_NAME__
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  __STACK_NAME___data:
    name: __STACK_NAME___data

networks:
  __NETWORK_NAME__:
    external: true